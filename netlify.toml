[build]
  command = "npm run build"
  publish = "out"

# Invite deep-links use the path form (/join/<token>), but the site is a static
# export with a single /join page. Serve that page for any /join/* URL (200 =
# rewrite, not redirect — the browser URL stays /join/<token> so JoinClient can
# read the token). The bare /join page is served normally by Netlify.
[[redirects]]
  from = "/join/*"
  to = "/join.html"
  status = 200

# Apple App Site Association MUST be served as application/json for iOS Universal
# Links to resolve. The Next route handler sets that content-type, but
# `output: export` writes only the body to an extension-less file, so Netlify
# defaults it to text/plain. Force it back here. (Path has no .json extension by
# Apple's spec.)
[[headers]]
  for = "/.well-known/apple-app-site-association"
  [headers.values]
    Content-Type = "application/json"
